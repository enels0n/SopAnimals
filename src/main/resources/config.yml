enabled-worlds:
  - world
disable-other-animals: true
disable-child-animals: true
min-level-for-interact: 1

bypassed-mobs:
  - WANDARING_TRADER
  - AXOLOTL

gender:
  male: "M"
  female: "F"

# Настройки приманки (lure).
# lure-range: в каком радиусе животные реагируют на приманку.
# lure-speed: скорость передвижения к игроку (1.0 = нормальная).
# lure-interval-ticks: как часто проверять (10 = каждые 0.5 сек).
lure-range: 10.0
lure-speed: 1.0
lure-interval-ticks: 10

messages:
  reload: "&8[&3&lSopAnimals&8] &aКонфиг перезагружен."
  error:
    transfer:
      args: "&cНеверное количество аргументов."
      no-player: "&cЭтот игрок не найден или сейчас не в сети."
      self: "&cНельзя передать самому себе."
    access:
      already: "&cНевозможно сменить статус на такой же."
    min-level: "&cНедостаточный уровень для взаимодействия с животными."
    milk:
      gender: "&cТолько самки дают молоко."
      cooldown: "&cКорову можно подоить через %time%."
  success:
    transfer: "&aЖивотное успешно передано другому игроку."
